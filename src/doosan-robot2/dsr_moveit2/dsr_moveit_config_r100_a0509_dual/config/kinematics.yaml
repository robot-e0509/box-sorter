left_arm:
  kinematics_solver: kdl_kinematics_plugin/KDLKinematicsPlugin
  kinematics_solver_search_resolution: 0.0050000000000000001
  kinematics_solver_timeout: 0.014999999999999999

right_arm:
  kinematics_solver: kdl_kinematics_plugin/KDLKinematicsPlugin
  kinematics_solver_search_resolution: 0.0050000000000000001
  kinematics_solver_timeout: 0.014999999999999999

# dual_arm is a composite group (left_arm + right_arm), not a single kinematic chain.
# Keep IK solvers only on left_arm/right_arm to avoid KDL initialization errors.
