# MoveIt uses this configuration for controller management

moveit_controller_manager: moveit_simple_controller_manager/MoveItSimpleControllerManager

moveit_simple_controller_manager:
  controller_names:
    - whole_body_controller
    - dual_dsr_moveit_controller

  whole_body_controller:
    type: FollowJointTrajectory
    joints:
      - base_x
      - base_yaw
      - left_joint_1
      - left_joint_2
      - left_joint_3
      - left_joint_4
      - left_joint_5
      - left_joint_6
      - right_joint_1
      - right_joint_2
      - right_joint_3
      - right_joint_4
      - right_joint_5
      - right_joint_6
    action_ns: follow_joint_trajectory
    default: true

  dual_dsr_moveit_controller:
    type: FollowJointTrajectory
    joints:
      - left_joint_1
      - left_joint_2
      - left_joint_3
      - left_joint_4
      - left_joint_5
      - left_joint_6
      - right_joint_1
      - right_joint_2
      - right_joint_3
      - right_joint_4
      - right_joint_5
      - right_joint_6
    action_ns: follow_joint_trajectory
    default: false
