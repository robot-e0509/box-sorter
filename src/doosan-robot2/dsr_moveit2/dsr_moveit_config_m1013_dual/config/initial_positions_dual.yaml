# Initial joint positions for dual arm mobile manipulator
# Using a "home" pose to avoid self-collision between arms

initial_positions:
  left_joint_1: 0.0
  left_joint_2: -0.785   # -45 degrees: lifts arm up
  left_joint_3: 1.57     # 90 degrees: bends elbow
  left_joint_4: 0.0
  left_joint_5: 0.785    # 45 degrees: wrist up
  left_joint_6: 0.0
  right_joint_1: 0.0
  right_joint_2: -0.785  # -45 degrees: lifts arm up
  right_joint_3: 1.57    # 90 degrees: bends elbow
  right_joint_4: 0.0
  right_joint_5: 0.785   # 45 degrees: wrist up
  right_joint_6: 0.0
