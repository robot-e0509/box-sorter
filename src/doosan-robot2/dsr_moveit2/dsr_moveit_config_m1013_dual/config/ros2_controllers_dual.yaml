# ros2_control configuration for dual arm mobile manipulator

controller_manager:
  ros__parameters:
    update_rate: 100  # Hz

    # Joint State Broadcaster
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    # Left Arm Controller
    left_arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    # Right Arm Controller
    right_arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    # Unified Dual Arm Controller (optional, for coordinated motion)
    dual_arms_controller:
      type: joint_trajectory_controller/JointTrajectoryController

# Left Arm Controller Configuration
left_arm_controller:
  ros__parameters:
    joints:
      - left_joint_1
      - left_joint_2
      - left_joint_3
      - left_joint_4
      - left_joint_5
      - left_joint_6

    command_interfaces:
      - position
      - velocity

    state_interfaces:
      - position
      - velocity

    allow_partial_joints_goal: false
    open_loop_control: false
    allow_integration_in_goal_trajectories: true

    constraints:
      stopped_velocity_tolerance: 0.01
      goal_time: 0.0

# Right Arm Controller Configuration
right_arm_controller:
  ros__parameters:
    joints:
      - right_joint_1
      - right_joint_2
      - right_joint_3
      - right_joint_4
      - right_joint_5
      - right_joint_6

    command_interfaces:
      - position
      - velocity

    state_interfaces:
      - position
      - velocity

    allow_partial_joints_goal: false
    open_loop_control: false
    allow_integration_in_goal_trajectories: true

    constraints:
      stopped_velocity_tolerance: 0.01
      goal_time: 0.0

# Dual Arms Controller (optional, for coordinated motion)
dual_arms_controller:
  ros__parameters:
    joints:
      - left_joint_1
      - left_joint_2
      - left_joint_3
      - left_joint_4
      - left_joint_5
      - left_joint_6
      - right_joint_1
      - right_joint_2
      - right_joint_3
      - right_joint_4
      - right_joint_5
      - right_joint_6

    command_interfaces:
      - position
      - velocity

    state_interfaces:
      - position
      - velocity

    allow_partial_joints_goal: true
    open_loop_control: false
    allow_integration_in_goal_trajectories: true

    constraints:
      stopped_velocity_tolerance: 0.01
      goal_time: 0.0
