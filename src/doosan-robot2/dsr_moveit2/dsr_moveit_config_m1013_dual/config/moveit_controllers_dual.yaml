# MoveIt controller configuration for dual arm mobile manipulator

# Controller manager configuration
moveit_controller_manager: moveit_simple_controller_manager/MoveItSimpleControllerManager

moveit_simple_controller_manager:
  controller_names:
    - dsr_dual_controller2

  # Unified dual arm controller (handles both arms)
  # This single controller manages all 12 joints (left + right)
  # MoveIt can send partial trajectories for individual arms thanks to allow_partial_joints_goal: true
  dsr_dual_controller2:
    type: FollowJointTrajectory
    joints:
      - left_joint_1
      - left_joint_2
      - left_joint_3
      - left_joint_4
      - left_joint_5
      - left_joint_6
      - right_joint_1
      - right_joint_2
      - right_joint_3
      - right_joint_4
      - right_joint_5
      - right_joint_6
    action_ns: follow_joint_trajectory
    default: true

# Trajectory execution configuration
trajectory_execution:
  allowed_execution_duration_scaling: 1.2
  allowed_goal_duration_margin: 0.5
  allowed_start_tolerance: 0.01

# Planning scene monitor settings
planning_scene_monitor:
  publish_planning_scene: true
  publish_geometry_updates: true
  publish_state_updates: true
  publish_transforms_updates: true
  publish_robot_description: true
  publish_robot_description_semantic: true
