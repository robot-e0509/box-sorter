# Kinematics solver configuration for dual arm mobile manipulator

left_arm:
  kinematics_solver: kdl_kinematics_plugin/KDLKinematicsPlugin
  kinematics_solver_search_resolution: 0.005
  kinematics_solver_timeout: 0.015
  kinematics_solver_attempts: 3

right_arm:
  kinematics_solver: kdl_kinematics_plugin/KDLKinematicsPlugin
  kinematics_solver_search_resolution: 0.005
  kinematics_solver_timeout: 0.015
  kinematics_solver_attempts: 3

# dual_arms: composite group - no solver needed here
# MoveIt automatically delegates IK to left_arm + right_arm subgroup solvers
# OMPL plans in combined 12-DOF joint space with inter-arm collision checking

# Optional: Gripper groups (if using Robotiq grippers)
left_arm_gripper_closed:
  kinematics_solver: kdl_kinematics_plugin/KDLKinematicsPlugin
  kinematics_solver_search_resolution: 0.005
  kinematics_solver_timeout: 0.015

left_arm_gripper_opened:
  kinematics_solver: kdl_kinematics_plugin/KDLKinematicsPlugin
  kinematics_solver_search_resolution: 0.005
  kinematics_solver_timeout: 0.015

right_arm_gripper_closed:
  kinematics_solver: kdl_kinematics_plugin/KDLKinematicsPlugin
  kinematics_solver_search_resolution: 0.005
  kinematics_solver_timeout: 0.015

right_arm_gripper_opened:
  kinematics_solver: kdl_kinematics_plugin/KDLKinematicsPlugin
  kinematics_solver_search_resolution: 0.005
  kinematics_solver_timeout: 0.015
